<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sanjay Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    section {
      padding: 80px 5%;
    }

    h2 {
      font-size: 32px;
      margin-bottom: 40px;
    }

    /* HERO SECTION */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
    }

    /* REELS SECTION */
    .reels-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 20px;
    }

    .video {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
    }

    .video iframe {
      width: 100%;
      height: 100%;
      border: none;
      transition: transform 0.4s ease;
    }

    .video:hover iframe {
      transform: scale(1.05);
    }

    /* RANDOM LAYOUT */
    .v1 { grid-column: span 6; aspect-ratio: 16/9; }
    .v2 { grid-column: span 3; aspect-ratio: 9/16; }
    .v3 { grid-column: span 3; aspect-ratio: 1/1; }
    .v4 { grid-column: span 4; aspect-ratio: 16/9; }
    .v5 { grid-column: span 5; aspect-ratio: 4/5; }
    .v6 { grid-column: span 3; aspect-ratio: 9/16; }
    .v7 { grid-column: span 4; aspect-ratio: 16/9; }

    /* MOBILE */
    @media (max-width: 768px) {
      .reels-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .video {
        grid-column: span 2 !important;
        aspect-ratio: 16/9;
      }
    }
  </style>
</head>

<body>

  <!-- HERO SECTION -->
  <section class="hero">
    Sanjay Portfolio
  </section>

  <!-- REELS SECTION (SECOND SECTION) -->
  <section>
    <h2>Reels</h2>

    <div class="reels-grid">

      <div class="video v1">
        <iframe src="https://www.youtube.com/embed/K2sT5RoeqSE" allowfullscreen></iframe>
      </div>

      <div class="video v2">
        <iframe src="https://www.youtube.com/embed/3L5RmD_N1YU" allowfullscreen></iframe>
      </div>

      <div class="video v3">
        <iframe src="https://www.youtube.com/embed/rjWIA18t15Q" allowfullscreen></iframe>
      </div>

      <div class="video v4">
        <iframe src="https://www.youtube.com/embed/h1usCli5Z2I" allowfullscreen></iframe>
      </div>

      <div class="video v5">
        <iframe src="https://www.youtube.com/embed/RXj40-n8THo" allowfullscreen></iframe>
      </div>

      <div class="video v6">
        <iframe src="https://www.youtube.com/embed/AiGBJXbaWzI" allowfullscreen></iframe>
      </div>

      <div class="video v7">
        <iframe src="https://www.youtube.com/embed/2ym-u2VtTlE" allowfullscreen></iframe>
      </div>

    </div>
  </section>

</body>
</html>
